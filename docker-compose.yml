services:

  frontend:
    build:
      context: ./Frontend
    container_name: email_summarizer_frontend
    ports:
      - "5173:5173"
    restart: unless-stopped
    networks:
      - frontend_network
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  backend:
    build:
      context: ./Backend
    container_name: email_summarizer_backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file:
      - ./Backend/.env
      - ./.env.docker
    networks:
      - frontend_network
      - backend_network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  db:
    image: postgres:16-alpine
    container_name: email_summarizer_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    env_file:
      - ./.env.docker
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

networks:
  frontend_network:
    driver: bridge
  backend_network:
    driver: bridge

volumes:
  pgdata: